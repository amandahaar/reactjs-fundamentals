<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik&display=swap" rel="stylesheet"/>

    <title>React.js - Fundamentos</title>

<!-- Tailwind CSS Theme -->
    <style type="text/tailwindcss">
        @theme {
            --text: #EBEBEB;
            --text-secondary: #6B6B6B;
            --primary: #462878;
            --background: #2D2A37;

            --gradient: 180deg, 
                rgba(0, 0, 0, 0.05) 0%, 
                rgba(255, 255, 255, 0.05) 100%;

            --gradient-hover: 180deg, 
                rgba(0, 0, 0, 0.1) 0%, 
                rgba(255, 255, 255, 0.1) 100%;
            
            --shadow: 0px 11px 7px 0px rgba(0, 0, 0, 0.01), 
                0px 7px 7px 0px rgba(0, 0, 0, 0.04), 
                0px 4px 6px 0px rgba(0, 0, 0, 0.10), 
                0px 2px 4px 0px rgba(0, 0, 0, 0.26), 
                0px 0px 2px 0px rgba(0, 0, 0, 0.29), 
                0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;
            
            --font-sans: 'Rubik', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen bg-linear-[180deg,_#807ECE_0%,_#8E7ECE_100%] text-(--text) font-(--font-sans)">
    <div id="root"></div>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

    <!--Component Text-->
    <script type="text/babel">

        const textVariants = {
            default: 'text-xl',
            muted: 'text-xl text-(--text-secondary)',
            heading: 'text-2xl',
            blast: 'text-3xl',
        }
        /*Variantes de texto:
        - Default: texto normal, padrão
        -  Muted: texto mais discreto, com menos destaue (geralmente em cinza)
        - Heading: título ou cabeçalho, maior e mais destacado
        - Blast: texto com muito destaque, impacto visual forte, geralmente usado para 
        números ou informações importantes (nome menos padronizado)*/

        /* O componente Text é um componente de texto genérico que pode ser usado para r
            enderizar diferentes tipos de texto, como parágrafos, títulos, etc. Ele recebe as seguintes props:
         * - as: o elemento HTML a ser renderizado (padrão: span)
         * - variant: a variante de estilo do texto (padrão: default)
         * - className: classes adicionais para estilização
         * - children: o conteúdo do texto
         * - ...props: outras props que podem ser passadas para o elemento HTML renderizado*/
        function Text({ as= 'span', variant= 'default', className, children, ...props }) {
            return React.createElement(
                as,
                {
                  className: `${textVariants[variant]} ${className ? className : ''}`,
                  ...props,  
                },
                children
            )
        }

        const buttonVariants = {
            default: 'bg-(--background)',
            primary: 'bg-(--primary)',
        }

        /* O componente Button é um componente de botão que utiliza o componente Text para renderizar o texto do botão. 
            Ele recebe as seguintes props: children: o conteúdo do botão */
        function Button({ variant= 'default', className, children, ...props }) {
            return (
                <Text
                    as="button"
                    variant="heading"
                    className={`
                        flex items-center justify-center rounded-xl
                        p-3 cursor-pointer text-(--text)
                        bg-linear-(--gradient)
                        hover:bg-linear-(--gradient-hover)
                        shadow-(--shadow)
                        
                        ${buttonVariants[variant]}
                        ${className ? className : ''}
                    `}
                    {...props}
                >
                    {children}
                </Text>
            )
        }

        function Card ({ children, className, ...props }){
            return (
                <div className={`
                    bg-(--background) shadow-(--shadow)
                    rounded-2xl
                    ${className ? className : ''}
                `}>
                    {children}                    
                </div>
            )

        }

        const buttons = [
            [{ input: "CE" },
            { input: "C", className: "flex-1 h-16" },
            { input: "÷", variant: "primary" }],

            [{ input: "7" },
            { input: "8" },
            { input: "9" },
            { input: "×", variant: "primary" }],
            
            [{ input: "4" },
            { input: "5" },
            { input: "6" },
            { input: "−", variant: "primary" }],

            [{ input: "1" },
            { input: "2" },
            { input: "3" },
            { input: "+", variant: "primary" }],

            [{ input: "0", className: "flex-1 h-16" },
            { input: "," },
            { input: "=", className: "w-16 h-16 bg-[#7F45E2]" }]
        ];

        function CalculatorDisplay({ operation, result }) {
            return (
                    <div className={`
                        flex flex-col gap-2 px-[1.375rem]
                        cursor-default select-none
                    `}>
                        <Text 
                            as="div" 
                            variant="muted"
                            className="flex items-center justify-end"
                        >
                            {operation}
                        </Text>
                        <div className={`
                          flex items-center justify-between
                        `}>                      
                            <Text variant="muted">
                                =
                            </Text>
                             <Text variant="blast">
                                {result}
                            </Text>  
                        </div>
                    </div>
            )
        }

        function Calculator() {
            return (
                <Card className={`
                    flex flex-col gap-[1.625rem] w-[22.25rem]
                    pt-14 px-8 pb-8
                `}>
                    
                    <CalculatorDisplay operation="1 + 1" result="2" />
                    
                    <div className="flex flex-col gap-3">
                       {/*Primeiro map: linha*/}
                        {buttons.map((row, index) => (
                            <div key={`row-${index}`} className="flex gap-3">
                                
                                {/*Segundoo map: coluna*/}
                                {row.map(button => (
                                    <Button 
                                        key={button.input} 
                                        className={button.className || "w-16 h-16"}
                                        variant={button.variant}>
                                            {button.input}
                                    </Button>
                                ))}
                            </div>
                        ))}
                        
                        

                    </div>
                
                </Card>
            )
        }

        function OperationHistory() {
            return (
                <Card className="w-full py-10 px-8">
                    <Text as="h1" variant="heading" className="mb-4">
                        Histórico de Operações
                    </Text>

                    <ul className="flex-col gap-3">
                        <Text as="li">
                            1 + 1 = 2
                        </Text>
                        <Text as="li">
                            2 + 3 +1 = 6  
                        </Text>
                        <Text as="li">
                            2 + 3 = 5  
                        </Text>
                    </ul>
                </Card>
            )
        }

        /*Parte que aparece no navegador*/
        function App() {
            return (
                <main className={`
                    py-28 px-4 sm:px-10
                    flex flex-col sm:flex-row
                    items-center sm:items-stretch
                    gap-2
                `}>
                    <Calculator />
                    <OperationHistory />
                </main>
            )
        }
    
        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    
    </script>
</body>
</html>
